; PlatformIO — dual-board WisBlock environmental node (gate-driven architecture).
;   pio run -e rak4631   → RAK4630 (nRF52840 + SX1262)
;   pio run -e rak3312   → RAK3312 (ESP32-S3 + SX1262)
; ~90% of the firmware is board-agnostic; board specifics live behind board_pins_<board>.h
; and src/board/<board>/ (selected via build_src_filter). Pick the gate with -DAPP_GATE.
;
; RAK4631 FIRST-TIME SETUP: copy boards/wiscore_rak4631.json + variants/WisCore_RAK4631_Board/
; into the framework (or run setup.sh). Fallback board: adafruit_feather_nrf52840.

[common]
framework = arduino
monitor_speed = 115200
; Pre-build hook: inject LoRaWAN OTAA credentials from firmware/.env (gitignored)
; as -DAPP_DEVEUI / -DAPP_JOINEUI / -DAPP_APPKEY. Keys stay out of source control.
extra_scripts = pre:scripts/inject_credentials.py
lib_deps =
    beegee-tokyo/SX126x-Arduino@^2.0.25

; Board-agnostic build flags. Change APP_GATE to select the gate (0..9, 21 for Gate 2.1).
build_flags =
    -DAPP_GATE=0
    -DAPP_GATE_ID_SCHEME_NEW=1
    -DAPP_GATE_TICK_MS=200
    -DAPP_GATE_IDLE_LOG_SEC=10
    -DAPP_GATE_SAMPLE_PERIOD_MS=1000
    ; Gate 9 uplink cadence — AS923 duty-cycle safe spacing for CONFIRMED uplinks
    -DAPP_GATE_UPLINK_PERIOD_MS=20000
    -DAPP_GATE6_BACKEND_ENABLE_DELAY_MS=8000
    ; APP_GATE*_EXPECTED_DEVICES (1=SGP40 only, 2=BMP280/BME280 only, 3=both) is set
    ; per-board below: RAK4630 has BME280 only (=2); RAK3312 has BME280 + live SGP40 (=3).
    ; Gate 9 deployed mode: 1 = never halt, keep sampling + uplinking sensor/battery
    ; to the gateway indefinitely (emits live_publish_running). 0 = stop after first
    ; full cycle (live_publish_ok / STOP_AFTER_PASS), the bring-up validation default.
    -DAPP_GATE9_CONTINUOUS=0
    -DAPP_SGP40_ADDR=0x59
    -DAPP_BMP280_ADDR=0x76
    -DAPP_SHTC3_ADDR=0x70
    -DAPP_I2C_FREQ_HZ=100000
    -DAPP_DISPLAY_SPI_MHZ=4
    -DAPP_DISPLAY_XRAM_OFFSET=0
    -DAPP_DISPLAY_LANDSCAPE=1
    -DAPP_DISPLAY_PANEL_PROFILE_SSD1680_250X122=1
    -DAPP_DISPLAY_BUSY_ACTIVE_HIGH=1
    -DAPP_DISPLAY_PWR_ACTIVE_HIGH=1
    -DAPP_DISPLAY_PWR_INPUT_PULLUP=1
    -DAPP_DISPLAY_PARTIAL_UPDATES=0
    -DAPP_DISPLAY_REQUIRE_BUSY_PULSE=0
    -DAPP_DISPLAY_REFRESH_FALLBACK_MS=10000
    ; Tri-color SSD1680 full refresh can exceed 10s; budget BUSY wait accordingly
    -DAPP_DISPLAY_REFRESH_TIMEOUT_MS=20000
    ; Tri-color SSD1680 full refresh visibly flashes ("flicker"); each refresh = one flash.
    ; Balanced cadence: earliest refresh 2 min, forced periodic refresh 1 hr, and a VOC delta
    ; large enough that live SGP40 noise alone does not trigger a flash between real changes.
    -DAPP_DISPLAY_MIN_REFRESH_SEC=120
    -DAPP_DISPLAY_MAX_REFRESH_SEC=3600
    -DAPP_REFRESH_VOC_DELTA_X100=1500
    -DAPP_REFRESH_PRESSURE_DELTA_PA=50
    -DAPP_REFRESH_TEMP_DELTA_CENTI_C=50
    ; Real SX126x-Arduino OTAA (AS923-1 / ChirpStack v4). Credentials injected
    ; from firmware/.env via scripts/inject_credentials.py (see extra_scripts).
    -DAPP_LORAWAN_SUBBAND=1
    -DAPP_LORAWAN_CONF_RETRIES=8
    -DAPP_LORAWAN_JOIN_TRIALS=8
    -DAPP_LORAWAN_JOIN_BACKOFF_MS=15000
    -DAPP_BATTERY_DEFAULT_MV=3950
    -Iinclude
    -Wall
    -Wextra
    -Wno-unused-parameter

; ---- RAK4630 (nRF52840 + SX1262) ----
[env:rak4631]
extends = common
platform = nordicnrf52
board = wiscore_rak4631
boards_dir = boards
board_build.variants_dir = variants
board_build.variant = WisCore_RAK4631_Board
build_src_filter = +<*> -<board/> +<board/rak4631/>
build_flags =
    ${common.build_flags}
    -DBOARD_RAK4631
    -DAPP_BATTERY_ADC_ENABLED=1
    ; BME280 only on this bench (SGP40 breakout faulty); VOC is seeded.
    -DAPP_GATE2P1_EXPECTED_DEVICES=2
    -DAPP_GATE3_EXPECTED_DEVICES=2
    -DAPP_GATE4_EXPECTED_DEVICES=2
    -DAPP_GATE9_EXPECTED_DEVICES=2
    -Ivariants/WisCore_RAK4631_Board

; ---- RAK3312 (ESP32-S3 16MB/8MB PSRAM + SX1262) ----
[env:rak3312]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
build_src_filter = +<*> -<board/> +<board/rak3312/>
build_flags =
    ${common.build_flags}
    -DBOARD_RAK3312
    -DAPP_BATTERY_ADC_ENABLED=0
    ; BME280 (0x76) confirmed on the bus; VOC is seeded until a working SGP40 ACKs
    ; at 0x59 (GY-SGP module did not respond — see docs). Bump these to 3 then.
    -DAPP_GATE2P1_EXPECTED_DEVICES=2
    -DAPP_GATE3_EXPECTED_DEVICES=2
    -DAPP_GATE4_EXPECTED_DEVICES=2
    -DAPP_GATE9_EXPECTED_DEVICES=2
    ; Route Serial to the ESP32-S3 native USB (CDC) so gate logs appear over USB
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
